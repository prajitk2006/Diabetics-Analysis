<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | HealthSight AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f5fa, #e6eef5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 60px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            max-width: 550px;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .error-icon {
            font-size: 80px;
            color: #0b4f6c;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 72px;
            font-weight: 700;
            color: #0b2b3c;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        h2 {
            font-size: 28px;
            font-weight: 600;
            color: #2c5f7a;
            margin-bottom: 16px;
        }
        p {
            color: #54738f;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .home-btn {
            display: inline-block;
            background: linear-gradient(145deg, #0b4f6c, #063247);
            color: white;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .home-btn i {
            margin-right: 8px;
        }
        .home-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px -8px rgba(11,79,108,0.3);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-heart-broken"></i>
        </div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The diagnostic page you're looking for doesn't exist.<br>Let's get you back to analyzing patient data.</p>
        <a href="{{ url_for('home') }}" class="home-btn">
            <i class="fas fa-arrow-left"></i> Return to Dashboard
        </a>
    </div>
</body>
</html>
